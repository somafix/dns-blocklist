name: Обновление DNS-блоклиста с ИИ

on:
  schedule:
    - cron: '0 */12 * * *'   # каждые 12 часов
  workflow_dispatch:         # можно запустить вручную

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Устанавливаем зависимости
        run: |
          pip install requests
      
      - name: Запускаем скрипт обновления
        run: python update_hosts.py
      
      - name: Коммитим и пушим изменения
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hosts.txt ai_custom_blocklist.txt ai_trackers.json hosts.backup
          git diff --staged --quiet || git commit -m "🤖 AI auto-update: blocklist $(date -u '+%Y-%m-%d %H:%M:%S') [skip ci]"
          git push
