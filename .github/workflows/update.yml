name: Update Blocklist

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create script
        run: |
          cat > update_blocklist.py << 'EOF'
import urllib.request
import urllib.error
import os
import re
import hashlib
from datetime import datetime

SOURCES = [
    "https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews-gambling-porn/hosts",
    "https://someonewhocares.org/hosts/zero/hosts",
    "https://raw.githubusercontent.com/PolishFiltersTeam/KADhosts/master/KADhosts.txt",
    "https://raw.githubusercontent.com/AdAway/adaway.github.io/master/hosts.txt",
    "https://gitlab.com/quidsup/notrack-blocklists/raw/master/notrack-blocklist.txt",
]

OUTPUT_FILE = "blocklist.txt"
HOSTS_PREFIX = "0.0.0.0"

def log(msg):
    print(f"[{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}] {msg}")

def download_file(url):
    try:
        req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
        with urllib.request.urlopen(req, timeout=30) as response:
            content = response.read().decode('utf-8', errors='ignore')
            return content.splitlines()
    except Exception as e:
        log(f"Error downloading {url}: {e}")
        return []

def is_valid_domain(domain):
    if not domain or len(domain) > 253:
        return False
    if re.match(r'^\d+\.\d+\.\d+\.\d+$', domain):
        return False
    if domain in ['localhost', 'localhost.localdomain', 'local', 'broadcasthost']:
        return False
    if re.search(r'[^a-zA-Z0-9\.\-_]', domain):
        return False
    return True

def parse_line(line):
    line = line.strip()
    if not line or line.startswith('#') or line.startswith('!'):
        return None
    
    if '#' in line:
        line = line.split('#')[0].strip()
    
    parts = line.split()
    if len(parts) >= 2 and parts[0] in ['0.0.0.0', '127.0.0.1', '::1']:
        domain = parts[1].lower()
    elif len(parts) == 1:
        domain = parts[0].lower()
    else:
        return None
    
    if is_valid_domain(domain):
        return domain
    return None

def main():
    log("Starting blocklist updater")
    
    all_domains = set()
    
    for url in SOURCES:
        log(f"Downloading: {url}")
        lines = download_file(url)
        for line in lines:
            domain = parse_line(line)
            if domain:
                all_domains.add(domain)
    
    log(f"Total unique domains: {len(all_domains)}")
    
    sorted_domains = sorted(all_domains)
    
    output_lines = [
        f"# Updated: {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}",
        f"# Total entries: {len(sorted_domains)}",
        ""
    ]
    
    for domain in sorted_domains:
        output_lines.append(f"{HOSTS_PREFIX} {domain}")
    
    old_hash = ""
    if os.path.exists(OUTPUT_FILE):
        with open(OUTPUT_FILE, 'rb') as f:
            old_hash = hashlib.md5(f.read()).hexdigest()
    
    with open(OUTPUT_FILE, 'w', encoding='utf-8') as f:
        f.write('\n'.join(output_lines))
    
    new_hash = hashlib.md5('\n'.join(output_lines).encode('utf-8')).hexdigest()
    
    if old_hash != new_hash:
        log(f"Updated: {OUTPUT_FILE}")
    else:
        log(f"No changes")
    
    log("Done")

if __name__ == "__main__":
    main()
EOF

      - name: Run script
        run: python3 update_blocklist.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update blocklist $(date +'%Y-%m-%d')"
          git push
