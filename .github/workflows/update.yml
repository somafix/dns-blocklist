name: Daily Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Забираем всю историю, включая теги
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Твой скрипт обновления
        run: |
          # Здесь твои команды, которые генерируют файлы
          # Например:
          # python update.py
          echo "Твои изменения здесь"
      
      - name: Commit changes
        run: |
          git add .
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d')"
      
      - name: Push changes 🔥 КЛЮЧЕВОЙ ФИКС 🔥
        run: |
          git pull --rebase origin main
          git push origin main