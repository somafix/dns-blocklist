name: Update Blocklist
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run
        run: |
          cat > u.py << 'EOF'
import urllib.request,os,re,hashlib
from datetime import datetime
S=['https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews-gambling-porn/hosts','https://someonewhocares.org/hosts/zero/hosts','https://raw.githubusercontent.com/PolishFiltersTeam/KADhosts/master/KADhosts.txt','https://raw.githubusercontent.com/AdAway/adaway.github.io/master/hosts.txt','https://gitlab.com/quidsup/notrack-blocklists/raw/master/notrack-blocklist.txt']
O='blocklist.txt'
D=set()
for u in S:
  try:
    r=urllib.request.Request(u,headers={'User-Agent':'Mozilla/5.0'})
    for l in urllib.request.urlopen(r,timeout=30).read().decode('utf-8','ignore').splitlines():
      l=l.strip()
      if not l or l[0] in '#!':continue
      if '#' in l:l=l.split('#')[0].strip()
      p=l.split()
      if len(p)>=2 and p[0] in['0.0.0.0','127.0.0.1','::1']:
        d=p[1].lower()
      elif len(p)==1:
        d=p[0].lower()
      else:continue
      if d and len(d)<=253 and not re.match(r'^\d+\.\d+\.\d+\.\d+$',d) and d not in['localhost','localhost.localdomain','local','broadcasthost'] and not re.search(r'[^a-zA-Z0-9\.\-_]',d):
        D.add(d)
  except:pass
with open(O,'w') as f:
  f.write(f'# {datetime.now()}\n# {len(D)} domains\n\n')
  for d in sorted(D):
    f.write(f'0.0.0.0 {d}\n')
EOF
          python3 u.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update $(date +'%Y-%m-%d')"
          git push