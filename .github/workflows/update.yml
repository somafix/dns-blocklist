name: Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: update-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ← КРИТИЧНО

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Prepare git
        run: |
          git config user.email "bot@github.com"
          git config user.name "bot"

      - name: Sync
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Generate
        run: python script.py

      - name: Commit
        run: |
          git add hosts.txt
          git diff --cached --quiet && exit 0
          git commit -m "update $(date -u +%Y-%m-%d)"

      - name: Push (retry-safe)
        run: |
          for i in {1..5}; do
            git push --force-with-lease origin main && exit 0
            echo "retry..."
            sleep 2
            git fetch origin main
            git reset --hard origin/main
          done
          exit 1