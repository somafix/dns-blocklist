name: Update DNS Blocklist

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run update script
        run: python script.py
        
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add hosts.txt
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Сохраняем изменения во временную ветку
          git checkout -b temp-branch
          git commit -m "Daily update $(date +'%Y-%m-%d')"
          
          # Переключаемся на main и забираем последние изменения
          git checkout main
          git pull origin main --rebase
          
          # Применяем изменения из временной ветки
          git cherry-pick temp-branch
          
          # Удаляем временную ветку и пушим
          git branch -D temp-branch
          git push origin main