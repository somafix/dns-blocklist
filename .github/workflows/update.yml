name: Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - run: python script.py
      - run: |
          git config user.email "bot@github.com"
          git config user.name "bot"
          git add hosts.txt
          git commit -m "update $(date -u +%Y-%m-%d)" || exit 0
          git pull --rebase
          git push