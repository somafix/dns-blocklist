name: Update Blocklist
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run script
        run: python3 -c "import urllib.request, os, re; from datetime import datetime; SOURCES = ['https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews-gambling-porn/hosts', 'https://someonewhocares.org/hosts/zero/hosts', 'https://raw.githubusercontent.com/PolishFiltersTeam/KADhosts/master/KADhosts.txt', 'https://raw.githubusercontent.com/AdAway/adaway.github.io/master/hosts.txt', 'https://gitlab.com/quidsup/notrack-blocklists/raw/master/notrack-blocklist.txt']; OUTPUT = 'blocklist.txt'; domains = set(); [domains.add(d) for url in SOURCES for l in urllib.request.urlopen(urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'}), timeout=30).read().decode('utf-8', errors='ignore').splitlines() if (lambda line: (line.strip(), line.split('#'))) and (lambda line: line and line[0] not in '#!' and (lambda p: (p[1].lower() if len(p)>=2 and p[0] in ('0.0.0.0','127.0.0.1','::1') else p[0].lower()) if len(p)>=1 else None)(line.split())) and (lambda d: d and len(d)<=253 and not re.match(r'^\d+\.\d+\.\d+\.\d+$', d) and d not in ('localhost','localhost.localdomain','local','broadcasthost') and not re.search(r'[^a-zA-Z0-9\.\-_]', d))(d) for d in [_] if d)]; open(OUTPUT, 'w').write(f'# Updated: {datetime.now()}\n# Total: {len(domains)}\n' + '\n'.join(f'0.0.0.0 {d}' for d in sorted(domains)))"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update $(date +'%Y-%m-%d')"
          git push