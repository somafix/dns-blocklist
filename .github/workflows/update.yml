name: Update Blocklist
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run script
        run: |
          python3 -c "
  import urllib.request, os, re, hashlib
  from datetime import datetime
  SOURCES = [
      'https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/fakenews-gambling-porn/hosts',
      'https://someonewhocares.org/hosts/zero/hosts',
      'https://raw.githubusercontent.com/PolishFiltersTeam/KADhosts/master/KADhosts.txt',
      'https://raw.githubusercontent.com/AdAway/adaway.github.io/master/hosts.txt',
      'https://gitlab.com/quidsup/notrack-blocklists/raw/master/notrack-blocklist.txt'
  ]
  OUTPUT = 'blocklist.txt'
  domains = set()
  for url in SOURCES:
      try:
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          content = urllib.request.urlopen(req, timeout=30).read().decode('utf-8', errors='ignore')
          for line in content.splitlines():
              line = line.strip()
              if not line or line[0] in '#!':
                  continue
              if '#' in line:
                  line = line.split('#')[0].strip()
              parts = line.split()
              if len(parts) >= 2 and parts[0] in ('0.0.0.0', '127.0.0.1', '::1'):
                  domain = parts[1].lower()
              elif len(parts) == 1:
                  domain = parts[0].lower()
              else:
                  continue
              if domain and len(domain) <= 253 and not re.match(r'^\d+\.\d+\.\d+\.\d+$', domain) and domain not in ('localhost', 'localhost.localdomain', 'local', 'broadcasthost') and not re.search(r'[^a-zA-Z0-9\.\-_]', domain):
                  domains.add(domain)
      except:
          pass
  with open(OUTPUT, 'w') as f:
      f.write(f'# Updated: {datetime.now()}\n# Total: {len(domains)}\n')
      for d in sorted(domains):
          f.write(f'0.0.0.0 {d}\n')
  "
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update $(date +'%Y-%m-%d')"
          git push