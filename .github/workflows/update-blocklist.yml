name: Daily Blocklist Update

on:
  schedule:
    # Запуск раз в сутки в 02:00 UTC
    - cron: '0 2 * * *'
  # Возможность запуска вручную из вкладки Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      # Важно: нужно push-права, чтобы скрипт мог закоммитить изменения
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Run AdBlock Updater
      run: python adblock_updater.py
    
    - name: Check for changes
      id: check_changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add blocklist.txt
        # Проверяем, есть ли изменения в индексе
        if git diff --cached --quiet; then
          echo "No changes to commit"
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "Changes detected"
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push if changed
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git commit -m "Auto-update blocklist [skip ci]"
        git push
