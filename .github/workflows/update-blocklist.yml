name: Build Blocklist

on:
  schedule:
    - cron: '0 */6 * * *'  # Каждые 6 часов
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install aiohttp aiofiles pyyaml
    
    - name: Run blocklist builder
      run: |
        # Используем рабочую директорию вместо /etc
        python update_blocklist.py --output ./blocklist.txt --format hosts
        
    - name: Check if files changed
      id: changes
      run: |
        git add blocklist.txt
        echo "changed=$(git diff --cached --name-only | wc -l)" >> $GITHUB_OUTPUT
    
    - name: Commit and push
      if: steps.changes.outputs.changed != '0'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git commit -m "Update blocklist $(date +'%Y-%m-%d %H:%M:%S')"
        git push
