name: Daily Update

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Run updater
      run: python adblock_updater.py
    
    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "bot@github.com"
        git add blocklist.txt blocklist.backup.txt
        git diff --cached --quiet || git commit -m "Auto-update blocklist $(date +'%Y-%m-%d')"
        git push