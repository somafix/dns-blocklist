# .github/workflows/build-blocklist.yml
name: Build DNS Blocklist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install aiohttp aiofiles pyyaml
    
    - name: Build blocklist
      run: |
        python update_blocklist.py \
          --output ./blocklist.txt \
          --format hosts \
          --max-domains 500000
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: blocklist
        path: blocklist.txt
    
    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add blocklist.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "Update blocklist $(date -u +'%Y-%m-%d %H:%M:%S')"
        git push
