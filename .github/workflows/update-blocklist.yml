name: Build Blocklist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build
        run: |
          curl -s https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts | grep -E '^0\.0\.0\.0' | awk '{print $2}' | sort -u > blocklist.txt
          curl -s https://big.oisd.nl/domains >> blocklist.txt
          sort -u -o blocklist.txt blocklist.txt
          echo "Total: $(wc -l < blocklist.txt) domains"
      
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt
          git diff --cached --quiet || git commit -m "Update blocklist"
          git push
