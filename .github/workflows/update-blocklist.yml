name: Build DNS Blocklist

# Глобальная переменная для принудительного использования Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  schedule:
    # Запуск ежедневно в 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Позволяет запускать вручную

jobs:
  build:
    name: Build Blocklist
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1  # Оптимизация: загружаем только последний коммит
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'  # Кэширование зависимостей
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    
    - name: Run blocklist builder
      run: |
        python update_blocklist.py
      continue-on-error: false
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dynamic-blocklist
        path: dynamic-blocklist.txt
        retention-days: 30
        if-no-files-found: error

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    permissions:
      contents: write
      pages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: dynamic-blocklist
        path: ./blocklist
    
    - name: Prepare deployment
      run: |
        mkdir -p ./deploy
        cp ./blocklist/dynamic-blocklist.txt ./deploy/
        
        # Создаем index.html для отображения информации
        cat > ./deploy/index.html << 'EOF'
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>DNS Blocklist</title>
            <style>
                body {
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
                    max-width: 800px;
                    margin: 0 auto;
                    padding: 20px;
                    line-height: 1.6;
                }
                .container {
                    background: #f5f5f5;
                    border-radius: 8px;
                    padding: 20px;
                    text-align: center;
                }
                a {
                    display: inline-block;
                    margin: 10px;
                    padding: 10px 20px;
                    background: #0366d6;
                    color: white;
                    text-decoration: none;
                    border-radius: 5px;
                }
                a:hover {
                    background: #0250b3;
                }
                .info {
                    margin-top: 20px;
                    padding: 10px;
                    background: #e1e4e8;
                    border-radius: 5px;
                    font-size: 14px;
                }
            </style>
        </head>
        <body>
            <div class="container">
                <h1>📋 DNS Blocklist</h1>
                <p>Актуальный список доменов для блокировки рекламы и трекеров</p>
                <a href="dynamic-blocklist.txt">⬇️ Скачать blocklist</a>
                <div class="info">
                    <p>📅 Обновляется ежедневно</p>
                    <p>🔗 Используйте в Pi-hole, AdGuard или других DNS-фильтрах</p>
                </div>
            </div>
        </body>
        </html>
        EOF
        
        # Создаем README для GitHub Pages
        cat > ./deploy/README.md << 'EOF'
        # DNS Blocklist
        
        Автоматически обновляемый список доменов для блокировки рекламы и трекеров.
        
        ## Использование
        
        Добавьте в ваш блокировщик:
        ```
        https://[ваш-username].github.io/[репозиторий]/dynamic-blocklist.txt
        ```
        
        ## Источники
        
        - StevenBlack/hosts
        - AdAway
        - HaGeZi
        
        ## Обновление
        
        Список обновляется автоматически каждый день.
        EOF
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./deploy
        publish_branch: gh-pages
        keep_files: false
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Update blocklist - ${{ github.run_number }}'

  # Опционально: отправка уведомлений
  notify:
    name: Send Notification
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Check status
      if: needs.build.result == 'failure' || needs.deploy.result == 'failure'
      run: |
        echo "❌ Build or deployment failed!"
        exit 1
    
    - name: Success message
      if: needs.build.result == 'success' && needs.deploy.result == 'success'
      run: |
        echo "✅ Blocklist successfully built and deployed!"
        echo "Total domains: $(wc -l < dynamic-blocklist.txt 2>/dev/null || echo 'unknown')"
