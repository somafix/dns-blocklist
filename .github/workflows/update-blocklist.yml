name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # измените на master если нужно
  workflow_dispatch:

# КРИТИЧНО: даем права на запись
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build project
        run: npm run build
        
      - name: Prepare deployment
        run: |
          # Создаем или очищаем ветку gh-pages
          git fetch origin gh-pages || true
          git checkout -B gh-pages
          
          # Копируем собранные файлы (измените путь если нужно)
          cp -r build/* . || true
          
          # Добавляем .nojekyll для GitHub Pages
          touch .nojekyll
          
          # Добавляем все изменения
          git add -A
          
          # Коммитим только если есть изменения
          git diff --cached --quiet || git commit -m "Deploy to GitHub Pages - ${{ github.sha }}"
          
      - name: Push the commit or tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin gh-pages --force
