name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # измените на master если нужно
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Настройка git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Получаем текущую ветку
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          echo "Deploying from branch: $CURRENT_BRANCH"
          
          # Переключаемся на ветку gh-pages
          git fetch origin gh-pages || true
          git checkout -B gh-pages
          
          # Копируем все файлы из основной ветки в корень gh-pages
          # Исключаем папку .git
          git checkout $CURRENT_BRANCH -- .
          
          # Добавляем .nojekyll для GitHub Pages
          touch .nojekyll
          
          # Добавляем все изменения
          git add -A
          
          # Коммитим только если есть изменения
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy to GitHub Pages - ${{ github.sha }}"
          fi
          
          # Пушим в gh-pages
          git push origin gh-pages --force
