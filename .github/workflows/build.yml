name: Generate
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    - name: Run
      run: go run main.go
    - name: Push
      run: |
        git config user.name "bot"
        git config user.email "bot@users.noreply.github.com"
        git add blocklist.txt
        git diff --quiet && exit 0
        git commit -m "update"
        git pull --rebase
        git push
