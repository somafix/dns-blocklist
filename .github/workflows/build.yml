name: Build DNS Blocklist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install aiohttp pydantic pydantic-settings
      
      - name: Run blocklist builder
        run: python update_blocklist.py --once
      
      - name: Commit and push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "actions@github.com"
          git add blocklist.txt blocklist.txt.gz
          git diff --staged --quiet || git commit -m "Update blocklist $(date '+%Y-%m-%d %H:%M:%S')"
          git push
