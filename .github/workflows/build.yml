name: Update Blocklist
on:
  schedule:
    - cron: '0 */12 * * *'  # Каждые 12 часов
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Update blocklist
        run: python3 update_blocklist.py
      
      - name: Check size
        run: |
          SIZE=$(du -h blocklist.txt | cut -f1)
          LINES=$(wc -l < blocklist.txt)
          echo "Размер: $SIZE, Строк: $LINES"
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Bot"
          git config user.email "actions@github.com"
          git add blocklist.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update blocklist $(date +'%Y-%m-%d')"
          git push