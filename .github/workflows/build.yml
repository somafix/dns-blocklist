name: Build DNS Blocklist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Run builder (auto-installs deps)
      run: |
        python3 update_blocklist.py
    
    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add blocklist.txt blocklist.txt.gz
        git diff --staged --quiet || git commit -m "update blocklist $(date +'%Y-%m-%d %H:%M:%S')"
        git push || true
