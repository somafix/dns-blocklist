name: Update Blocklist
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run updater
        run: python3 update_blocklist.py
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Bot"
          git config user.email "actions@github.com"
          git add blocklist.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Update $(date +'%Y-%m-%d')"
          git push