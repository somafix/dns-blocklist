name: Build Blocklist
on: [push, schedule]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: |
          pip install aiohttp aiofiles pydantic pydantic-settings
          
      - name: Run Builder
        run: python3 update_blocklist.py
        
      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/*
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update blocklist" && git push)
