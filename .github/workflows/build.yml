name: Build Blocklist

on:
  schedule:
    - cron: '0 0 * * *'  # каждый день в 00:00
  workflow_dispatch:      # можно запустить вручную

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      
      - name: Build
        run: go build -o blocklist main.go
      
      - name: Run
        run: ./blocklist
        env:
          BLOCKLIST_OUTPUT: blocklist.txt
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blocklist
          path: blocklist.txt
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocklist.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update blocklist [skip ci]"
          git push
