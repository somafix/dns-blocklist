name: Generate Blocklist

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build
        run: go build -o blocklist main.go
      
      - name: Generate blocklist
        run: ./blocklist
      
      - name: Commit and push with force
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stash local changes
          git stash || true
          
          # Pull latest with rebase
          git pull origin main --rebase
          
          # Apply stashed changes
          git stash pop || true
          
          # Add and commit
          git add blocklist.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Update blocklist [skip ci]"
          
          # Push with force lease (safer than --force)
          git push origin main --force-with-lease
