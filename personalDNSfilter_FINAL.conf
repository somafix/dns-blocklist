###############################################################################
#                   PERSONALDNSFILTER v5.1 - ENTERPRISE                        #
#              CONFIGURATION: AUDITED | OPTIMIZED | SECURE                     #
###############################################################################

# =============================================================================
# CORE DNS CONFIGURATION
# =============================================================================

detectDNS = true

# Secure DNS-over-TLS only - No unencrypted fallbacks
fallbackDNS = 1.1.1.2::853::DoT::security.cloudflare-dns.com; 9.9.9.9::853::DoT::dns.quad9.net

passcode = 

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================

ipVersionSupport = 46
ipV4BlockedHost = 0.0.0.0
ipV6BlockedHost = ::
maxResolverCount = 6

# =============================================================================
# LOCAL RESOLVER
# =============================================================================

enableLocalResolver = true
localResolverTTL = 600

# =============================================================================
# PROXY (DISABLED)
# =============================================================================

resolveOverHttpProxy = false
httpProxyHost = my.proxy
httpProxyIP = 10.0.2.2
httpProxyPort = 8080
httpProxyBasicAuthStr =

# =============================================================================
# ANDROID VPN CONFIGURATION
# =============================================================================

routeUnderlyingDNS = true
routeIPs = 8.8.8.8; 8.8.4.4; 1.1.1.1; 1.0.0.1
AUTOSTART = true
androidAppWhiteList = <none>

# =============================================================================
# DNS PROXY MODE
# =============================================================================

dnsProxyOnAndroid = false
dnsProxyPortAndroid = 5300
dnsProxyPortNonAndroid = 53
dnsProxyOnlyLocalRequests = true
rootModeOnAndroid = false
vpnInAdditionToProxyMode = false
androidKeepAwake = true

# =============================================================================
# DNSCRYPT (DISABLED)
# =============================================================================

manageDNSCryptProxy = false
dnsCryptProxyStartOptions = -config /system/etc/dnscrypt-proxy/dnscrypt-proxy.toml

# =============================================================================
# LOGGING (DISABLED FOR PERFORMANCE)
# =============================================================================

enableTrafficLog = false
trafficLogName = trafficlog
trafficLogSize = 1048576
trafficLogSlotCount = 2

# =============================================================================
# REMOTE CONTROL (DISABLED)
# =============================================================================

client_remote_ctrl_host = 127.0.0.1
client_remote_ctrl_keyphrase = NOT_SET_DISABLED
client_remote_ctrl_port = -1
server_remote_ctrl_keyphrase = NOT_SET_DISABLED
server_remote_ctrl_port = -1

# =============================================================================
# DEBUG & PERFORMANCE
# =============================================================================

debug = false
dnsRequestTimeout = 5000
filterHostsCacheSize = 20000
allowedHostsCacheSize = 20000
checkResolvedIP = false
checkCNAME = true

# =============================================================================
# FILTER HOSTS FILE
# =============================================================================

filterHostsFile = FILTERHOSTS.TXT
filterActive = true

# =============================================================================
# BLOCKLIST SOURCES - AUDITED & OPTIMIZED
# =============================================================================
# SOURCES:
#   1. AdAway         - Lightweight ad-blocking (stable)
#   2. somafix/dynamic-live - Dynamic blocklist (real-time updates)
#   3. StevenBlack    - Unified hosts (comprehensive coverage)
#
# REMOVED: hagezi/ultimate (too heavy, performance issues)
# =============================================================================

filterAutoUpdateURL = https://adaway.org/hosts.txt; https://raw.githubusercontent.com/somafix/dns-blocklist/main/dynamic-blocklist.txt; https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts

filterAutoUpdateURL_IDs = adaway; dynamic-live; stevenblack

filterAutoUpdateURL_categories = ads; dynamic; security

filterAutoUpdateURL_switchs = true; true; true

previousAutoUpdateURL = https://adaway.org/hosts.txt; https://raw.githubusercontent.com/somafix/dns-blocklist/main/dynamic-blocklist.txt; https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts

reloadIntervalDays = 1

# =============================================================================
# UI CONFIGURATION
# =============================================================================

filterLogFormat = <font color='#E53935'>($CONTENT)</font>
acceptLogFormat = <font color='#43A047'>($CONTENT)</font>
fwdLogFormat = <font color='#FFB300'>($CONTENT)</font>
normalLogFormat = ($CONTENT)
logTextSize = 14
repeatingLogSuppressTime = 2000
addLiveLogTimestamp = true
liveLogTimeStampFormat = '<font color=''#8c8c8c''><strong>'HH:mm:ss'</strong></font>'

# =============================================================================
# FOOTER & INFO
# =============================================================================

footerLink = <font color='#ffffff'><strong><a href='https://www.zenz-solutions.de/personaldnsfilter-wp/'>WEBSITE</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<a href='https://www.zenz-solutions.de/donations'>DONATE</a>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<a href='https://www.zenz-solutions.de/personaldnsfilter-privacy/'>PRIVACY</a></strong></font>

showInitialInfoPopUp = true
initialInfoPopUpTitle = Consider your rating!
initialInfoPopUpText = Thanks for using our free app personalDNSfilter!<br><br>Please ensure <strong>private DNS is disabled</strong> in Android network settings. When enabled, personalDNSfilter might be bypassed!<br><br>In addition allow personalDNSfilter to <strong>run unrestricted in background without battery optimization</strong> as otherwise Android might kill the service!<br><br>Sometimes we get bad ratings due to misunderstanding. Therefore, before rating, please check our <a href='https://www.zenz-home.com/personaldnsfilter/help/faq.php'>FAQ</a></strong>, or ask our <a href='https://telegram.me/pdnsf'>Telegram group</a></strong>.

# =============================================================================
# ADVANCED
# =============================================================================

dumpDNSPerfInfo = false
useActionMenuFallback = false
forceAndroidDisplayMode = none
